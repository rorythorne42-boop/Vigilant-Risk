<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="google-site-verification" content="GV_yWO6T4_MDOnV9JbSgg63eCr2N4N9QEDanJ83bwtg" />
  <title>Vigilant Risk</title>
  <meta name="description" content="Vigilant Risk — Close Protection, Risk Analysis, Investigations">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#050505;
      --text:#f4eee8;
      --muted:rgba(244,238,232,0.68);
      --soft:rgba(244,238,232,0.16);
      --soft-2:rgba(244,238,232,0.08);
    }

    *{box-sizing:border-box}

    html,body{
      margin:0;
      min-height:100%;
      /* Wolf background positioned slightly higher now that the top line is gone */
      background:
        url('WhiteWolfArtboard 1.svg') no-repeat center 38% / 600px, 
        radial-gradient(circle at 50% 55%, rgba(255,255,255,0.05), transparent 28%),
        radial-gradient(circle at 18% 12%, rgba(201,157,95,0.10), transparent 18%),
        radial-gradient(circle at 82% 88%, rgba(255,255,255,0.04), transparent 20%),
        linear-gradient(180deg, #0a0a0a 0%, #050505 50%, #020202 100%);
      color:var(--text);
      font-family:'Montserrat', sans-serif;
      background-attachment: fixed;
    }

    body{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
    }

    .wrap{
      width:100%;
      max-width:920px;
      text-align:center;
      position:relative;
      z-index:1;
    }

    h1{
      margin:0;
      font-size:clamp(2.5rem, 7.2vw, 4.7rem);
      font-weight:500;
      letter-spacing:0.26em;
      text-transform:uppercase;
    }

    .services{
      margin-top:22px;
      font-size:0.68rem;
      letter-spacing:0.34em;
      text-transform:uppercase;
      color:var(--muted);
    }

    .summary{
      max-width:850px;
      margin:34px auto 0;
      font-size:0.95rem;
      line-height:1.75;
      color:rgba(244,238,232,0.9);
      padding: 0 10px;
    }

    .cta{
      margin-top:40px;
      display:inline-flex;
      flex-direction:column;
      align-items:center;
      gap:8px;
      min-width:210px;
      padding:14px 24px 15px;
      border-radius:999px;
      text-decoration:none;
      color:var(--text);
      background:linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.03));
      border:1px solid var(--soft-2);
      box-shadow:inset 0 1px 0 rgba(255,255,255,0.06), 0 8px 30px rgba(0,0,0,0.32);
      transition:transform .2s ease, border-color .2s ease;
      cursor: pointer;
    }

    .cta:hover{
      transform:translateY(-1px);
      border-color:var(--soft);
      background:linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.04));
    }

    .cta-label{
      font-size:0.56rem;
      letter-spacing:0.34em;
      text-transform:uppercase;
      color:var(--muted);
    }

    .cta-email{
      font-size:0.92rem;
      font-weight:500;
      letter-spacing:0.02em;
    }

    @media (max-width: 700px){
      h1{ font-size: 2.8rem; letter-spacing: 0.15em; }
      .services{ font-size: 0.55rem; letter-spacing: 0.18em; line-height: 1.6; }
      .summary{ font-size: 0.9rem; margin-top: 24px; max-width: 100%; }
      .cta { margin-top: 30px; width: 100%; max-width: 280px; }
      html, body { 
        background-size: 90% auto, auto, auto, auto, auto; 
        background-position: center 32%, center, center, center, center;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>Vigilant Risk</h1>
    <div class="services">Close Protection • Risk Analysis • Investigations</div>
    <div class="summary">
      Specialist close protection, risk analysis and investigative services for private clients and organisations.<br>
      Built on discretion, operational awareness and calm professional delivery.
    </div>
    
    <a href="mailto:info@vigilant-risk.com" class="cta" onclick="navigator.clipboard.writeText('info@vigilant-risk.com');">
      <span class="cta-label">Enquiries</span>
      <span class="cta-email">info@vigilant-risk.com</span>
    </a>
  </main>
</body>
</html>
